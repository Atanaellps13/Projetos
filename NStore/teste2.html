<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste NStore</title>
    <style>

        body{
            background-color: #0A0C12;
            color: white;
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
            overflow-x: hidden;
            width: 100%;
            padding: 0;
        }
        header{
            background-color: #13161C;
            box-shadow: 0 1px 3px #0d0f14;
        }
        .container{
            max-width: 1200px;
            display: flex;
            margin: 0 auto;
            align-items: center;
            justify-content: center;
        }
        .container1{
            max-width: 1200px;
            display: flex;
            margin: 0 auto;
            align-items: center;
            justify-content: center;
            margin-right: -100px;
        }
        
        nav{
            margin: 0 20px 0 0;
        }
        nav ul{
            list-style: none;
            display: flex;
            gap: 10px;
        }
        nav ul a{
            text-decoration: none;
            color: white;
            font-weight: bolder;
            padding: 7px 10px;
            border-radius: 10px;
        }
        nav ul a:hover{
            text-decoration: underline;
            background-color: #272d38;
        }
        .logo{
            align-items: center;
            display: flex;
        }
        .logo h1{
            font-size: 25px;
        }
        .logo img{
            width: 35px;
            margin: 5%;
        }
        .discord{
            background-color: #5865f2;
            padding: 5px 10px;
            border-radius: 10px;
            font-weight: 600;
            width: 136px;
            height: 19px;
            margin-left: auto;
        }
        .discord a{
            text-decoration: none;
            color: #fff;
        }
        .discord:hover{
            background-color: #4c57cf;
        }
        .main1{
            text-align: center;
            margin: -10px;
        }
        div.main1 p{
            margin: -18px;
        }
    </style>
</head>
<body>
    <header>
        <div>
            <div class="container">
                <div class="container1">
                    <nav>
                        <ul>
                            <li><a href="#">Home</a></li>
                            <li><a href="#">Bots</a></li>
                            <li><a href="#">Sistemas</a></li>
                        </ul>
                    </nav>
                    <div class="logo">
                        <img src="logo1.png" alt="NSTORE Logo">
                        <h1>NStore</h1>
                    </div>
                    <div>
                        <nav>
                            <ul>
                                <li><a href="#">Planos</a></li>
                                <li><a href="#">Suporte</a></li>
                                <li><a href="#">TESTE</a></li>
                            </ul>
                        </nav>
                    </div>
                </div>
                <div class="discord">
                <a href="#"><i></i> Entrar no Discord</a>
            </div>
            </div>
        </div>
    </header>
    <main>
        <div>
            <div class="main1">
                <h1>Eleve Seu Servidor NStore Bots!</h1>
                <p>Os melhores Bots de Fivem!</p>
            </div>
        </div>
    </main>
</body>
</html>
