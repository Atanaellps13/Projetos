<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copa do Mundo 2026</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color: #A0A5B0;
            color: white;
        }
        h1{
            text-align: center;
            background-color: rgb(66, 181, 66);
            border-radius: 5px;
            box-shadow: 5px 5px 15px #4a6750;

        }
        .card-jogo{
            display: inline-block;
            background-color: rgb(59, 59, 101);
            height: 120px;
            width: 250px;
            text-align: center;
            font-size: 2em;
            border: 1px solid rgb(15, 15, 15);
            border-radius: 5px;
        }
        .destaque{
            font-weight: bolder;
            color: rgb(233, 233, 68);
        }
        .card-jogo:hover{
            background-color: #236f6e;
            box-shadow: 5px 5px 15px #59f578;
        }
    </style>
</head>
<body>
    <h1>Chavemento Copa do Mundo 2026</h1>
    <div class="card-jogo"><span class="destaque">Brasil</span> 7<br>x <br>Alemanha 0</div>
    <div class="card-jogo"><span class="destaque">Argentina</span> 0<br>x <br>Cabo Verde 1</div>
</body>
</html>
